name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/**/package-lock.json

      - name: Install dependencies
        working-directory: projects/mathemagician
        run: npm ci

      - name: Run unit tests
        working-directory: projects/mathemagician
        run: npm test -- --watchAll=false --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/mathemagician/package-lock.json

      - name: Install dependencies
        working-directory: projects/mathemagician
        run: npm ci

      - name: Build
        working-directory: projects/mathemagician
        run: npm run build
        env:
          CI: false

  # NOTE: Vercel deployment is handled automatically by the Vercel GitHub App
  # Each push to master creates a production deployment
  # Each PR creates a preview deployment automatically
